name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  lint:
    name: Lint & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Backend
        run: |
          cd server
          npm ci
          npm run lint

      - name: Lint Frontend
        run: |
          cd client
          npm ci
          npm run lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Lint Worker
        run: |
          cd worker
          pip install flake8
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Lint Backend
        run: |
          cd server
          npm ci
          npm run lint

      - name: Lint Frontend
        run: |
          cd client
          npm ci
          npm run lint

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Get short SHA
        id: vars
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./server
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-backend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-backend:${{ steps.vars.outputs.sha_short }}

      - name: Build and Push Client
        uses: docker/build-push-action@v5
        with:
          context: ./client
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-frontend:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-frontend:${{ steps.vars.outputs.sha_short }}

      - name: Build and Push Worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-worker:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-worker:${{ steps.vars.outputs.sha_short }}

      - name: Checkout infra repository
        uses: actions/checkout@v4
        with:
          repository: priyanshuKumar56/ai-task-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra

      - name: Update tags in manifestations
        run: |
          cd infra
          # Update Frontend in services.yaml
          sed -i 's|image: .*/ai-task-platform-frontend:.*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-frontend:${{ steps.vars.outputs.sha_short }}|g' k8s/services.yaml
          
          # Update Backend
          sed -i 's|image: .*/ai-task-platform-backend:.*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-backend:${{ steps.vars.outputs.sha_short }}|g' k8s/backend-deployment.yaml
          
          # Update Worker
          sed -i 's|image: .*/ai-task-platform-worker:.*|image: ${{ secrets.DOCKER_HUB_USERNAME }}/ai-task-platform-worker:${{ steps.vars.outputs.sha_short }}|g' k8s/worker-deployment.yaml
          
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "chore: update image tags to ${{ steps.vars.outputs.sha_short }}" || echo "No changes to commit"
          git push origin main
