version: '3.9'

services:
  # ─── MongoDB ─────────────────────────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: atp-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-secret}
      MONGO_INITDB_DATABASE: ai-task-platform
    volumes:
      - mongo_data:/data/db
      - ./scripts/mongo-init.js:/docker-entrypoint-initdb.d/init.js:ro
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [atp-network]

  # ─── Redis ───────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: atp-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redispass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks: [atp-network]

  # ─── Backend API ─────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
      target: production
    container_name: atp-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGODB_URI: ${MONGODB_URI}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt-key-change-in-prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super-secret-refresh-key-change-in-prod}
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ALLOWED_ORIGINS: http://localhost:3000
      LOG_LEVEL: info
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health/live"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks: [atp-network]

  # ─── Python Worker ────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./worker
      dockerfile: Dockerfile
      target: production
    container_name: atp-worker
    restart: unless-stopped
    environment:
      REDIS_URL: ${REDIS_URL}
      MONGODB_URI: ${MONGODB_URI}
      MONGO_DB_NAME: ai-task-platform
      NODE_ENV: development
      LOG_LEVEL: INFO
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    deploy:
      replicas: 2  # Run 2 worker replicas locally
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/live')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks: [atp-network]

  # ─── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
      target: production
    container_name: atp-frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    environment:
      VITE_API_URL: http://localhost:5000
    depends_on:
      - backend
    networks: [atp-network]

  # ─── Redis Commander (Dev UI) ─────────────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: atp-redis-ui
    restart: unless-stopped
    profiles: [dev-tools]
    ports:
      - "8082:8081"
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-redispass}
    depends_on: [redis]
    networks: [atp-network]

volumes:
  mongo_data:
  redis_data:

networks:
  atp-network:
    driver: bridge
    name: ai-task-platform
